#timeline.show{opacity:1}

#tl-fill{position:absolute;left:0;top:0;height:100%;background:#c8a84e;border-radius:1px;

#tl-dot{position:absolute;top:50%;width:8px;height:8px;background:#c8a84e;border-radius:50%;

  transition:left .15s ease}
#tl-years{width:60%;max-width:700px;display:flex;justify-content:space-between;margin-bottom:4px}
#tl-years span{font-size:8px;color:#332a15;letter-spacing:1px;transition:color .3s}

#tl-label{font-size:8px;color:#332a15;letter-spacing:2px;margin-top:2px}

.dp-idx{font-size:9px;color:#332a15;letter-spacing:4px;margin-bottom:12px}
.dp-name{font-size:26px;color:#c8a84e;letter-spacing:3px;margin-bottom:2px}
.dp-en{font-size:10px;color:#665520;letter-spacing:3px;text-transform:uppercase;margin-bottom:20px}

.dp-verify.artistic{color:#6a4a2a}
.dp-source{font-size:9px;color:#332a15;margin-top:2px}

/* ── INPUT (bottom center) ── */


/* ── TOAST ── */
#toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-12px);

#commitlog.show{opacity:.5}
.cl-title{font-size:8px;color:#2a2310;letter-spacing:3px;margin-bottom:6px}
.cl-e{font-size:9px;color:#332a15;font-family:'Courier New',monospace;line-height:1.8;

body.flying{cursor:grab}
body.flying:active{cursor:grabbing}

/* ── HINT ── */

#tcStory{display:block;font-size:11px;color:#8a7430;letter-spacing:1.5px;line-height:1.7;

#ctrls{position:fixed;bottom:56px;right:16px;z-index:100;display:flex;flex-direction:column;
  gap:4px;opacity:0;transition:opacity 1s ease 3s}
#ctrls.show{opacity:1}
.cb{width:36px;height:36px;background:transparent;border:1px solid rgba(50,42,21,.5);

// ── ∞ PATH POSITION ──
function infPos(t){
  var a=40,s=Math.sin(t),d=1+s*s;
  return{x:a*Math.cos(t)/d,z:a*s*Math.cos(t)/d}
}

// ── TEXTURE HELPERS ──
function txtTex(text,opt){
  opt=opt||{};
  var fs=opt.fs||20,col=opt.col||'#c8a84e',ff=opt.ff||'Georgia,serif',mw=opt.mw||512,lh=opt.lh||1.4,al=opt.al||'center',fw=opt.fw||'normal';
  var dpr=2;
  var cv=document.createElement('canvas'),cx=cv.getContext('2d');
  // 先用逻辑尺寸计算布局
  cx.font=fw+' '+fs+'px '+ff;
  var lines=text.indexOf('\n')>=0?text.split('\n'):[text],maxW=0;
  lines.forEach(function(l){var w=cx.measureText(l).width;if(w>maxW)maxW=w});
  var logW=Math.min(Math.max(maxW+20,64),1024);
  var textH=fs*lh*lines.length;
  var pad=fs*(lines.length>1?0.6:0.9);
  var logH=Math.max(textH+pad*2,fs*1.2);
  // 用2x物理尺寸渲染
  cv.width=logW*dpr;cv.height=logH*dpr;
  cx=cv.getContext('2d');cx.font=fw+' '+fs*dpr+'px '+ff;
  cx.fillStyle='rgba(0,0,0,0)';cx.fillRect(0,0,cv.width,cv.height);
  cx.fillStyle=col;cx.textAlign=al;cx.textBaseline='middle';
  lines.forEach(function(l,i){
    var x=al==='center'?cv.width/2:al==='right'?cv.width-10*dpr:10*dpr;
    var y=cv.height/2+(i-(lines.length-1)/2)*fs*dpr*lh;
    cx.fillText(l,x,y)
  });
  var tx=new THREE.CanvasTexture(cv);tx.needsUpdate=true;
  tx.minFilter=THREE.LinearMipmapLinearFilter;tx.magFilter=THREE.LinearFilter;
  // 存储逻辑尺寸供sprite使用
  tx._logW=logW;tx._logH=logH;return tx
}

function txtSprite(text,opt){
  opt=opt||{};
  var tex=txtTex(text,opt);
  var mat=new THREE.SpriteMaterial({map:tex,transparent:true,opacity:opt.op||1,depthWrite:false});
  var sp=new THREE.Sprite(mat);
  var s=(opt.s||1)*(isMobile?1.25:1),asp=tex._logW/tex._logH;
  sp.scale.set(s*asp,s,1);return sp
}

// ── STARS ──
function makeStars(){
  var n=isMobile?600:1500,geo=new THREE.BufferGeometry();
  var pos=new Float32Array(n*3),col=new Float32Array(n*3);
  for(var i=0;i<n;i++){
    var r=400+Math.random()*400,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th);pos[i*3+1]=r*Math.cos(ph);pos[i*3+2]=r*Math.sin(ph)*Math.sin(th);
    var b=.2+Math.random()*.6;
    col[i*3]=b*.8;col[i*3+1]=b*.7;col[i*3+2]=b*.5

  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));

}

// ── ∞ PATH (ribbon + glow line) ──
function makePath(){
  var pts=[];
  for(var i=0;i<=200;i++){var t=i/200*Math.PI*2,p=infPos(t);pts.push(new THREE.Vector3(p.x,0,p.z))}
  pathCurve=new THREE.CatmullRomCurve3(pts,true);

  // Dark regolith ribbon
  var segs=300,w=4,rP=new Float32Array((segs+1)*2*3),rU=new Float32Array((segs+1)*2*2),idx=[];
  for(var i=0;i<=segs;i++){
    var u=i/segs,pt=pathCurve.getPoint(u),tg=pathCurve.getTangent(u);
    var nm=new THREE.Vector3(-tg.z,0,tg.x).normalize();
    var L=pt.clone().add(nm.clone().multiplyScalar(w)),R=pt.clone().sub(nm.clone().multiplyScalar(w));
    rP[i*6]=L.x;rP[i*6+1]=-.15;rP[i*6+2]=L.z;
    rP[i*6+3]=R.x;rP[i*6+4]=-.15;rP[i*6+5]=R.z;
    rU[i*4]=0;rU[i*4+1]=u;rU[i*4+2]=1;rU[i*4+3]=u
  }
  for(var i=0;i<segs;i++){var a=i*2,b=i*2+1,c=(i+1)*2,d=(i+1)*2+1;idx.push(a,b,c,b,d,c)}
  var rGeo=new THREE.BufferGeometry();
  rGeo.setAttribute('position',new THREE.BufferAttribute(rP,3));
  rGeo.setAttribute('uv',new THREE.BufferAttribute(rU,2));rGeo.setIndex(idx);rGeo.computeVertexNormals();

  // Regolith texture
  var rc=document.createElement('canvas');rc.width=64;rc.height=256;
  var rx=rc.getContext('2d'),rg=rx.createLinearGradient(0,0,64,0);
  rg.addColorStop(0,'#080604');rg.addColorStop(.5,'#12100a');rg.addColorStop(1,'#080604');
  rx.fillStyle=rg;rx.fillRect(0,0,64,256);
  for(var i=0;i<800;i++){var x=Math.random()*64,y=Math.random()*256,v=Math.random()*12;
    rx.fillStyle='rgba('+v+','+(v*.7)+','+(v*.3)+',0.2)';rx.fillRect(x,y,1,1)}
  var rTex=new THREE.CanvasTexture(rc);rTex.wrapS=THREE.RepeatWrapping;rTex.wrapT=THREE.RepeatWrapping;rTex.repeat.set(2,16);

  var ribbon=new THREE.Mesh(rGeo,new THREE.MeshStandardMaterial({map:rTex,color:0x1a1510,roughness:.95,metalness:.05,side:THREE.DoubleSide}));
  scene.add(ribbon);

  // Glow line (thin gold)
  var gP=[];for(var i=0;i<=400;i++){var p=pathCurve.getPoint(i/400);gP.push(p.x,.02,p.z)}
  var gGeo=new THREE.BufferGeometry();gGeo.setAttribute('position',new THREE.Float32BufferAttribute(gP,3));
  var gLine=new THREE.Line(gGeo,new THREE.LineBasicMaterial({color:0x665520,transparent:true,opacity:.35}));
  gLine.userData.isPath=true;scene.add(gLine);
  pathPts=gP;
}

// ── CAMERA FLY ──
var flying=false,flyAnim=null;
function flyToMonument(m){
  if(flyAnim)cancelAnimationFrame(flyAnim);flyAnim=null;flying=true;
  ctrl.enabled=false;
  document.body.classList.add('flying');
  // 纪念碑世界中心
  var box=new THREE.Box3().setFromObject(m.group);
  var center=box.getCenter(new THREE.Vector3());
  // 计算从纪念碑到当前相机方向的水平角
  var camDir=new THREE.Vector3().subVectors(cam.position,center).normalize();
  camDir.y=0;camDir.normalize();
  // 目标位置：纪念碑前方偏上，固定距离保证好看
  var size=box.getSize(new THREE.Vector3());
  var dist=Math.max(Math.max(size.x,size.z)*(isMobile?1.2:1.5),isMobile?6:8);
  var targetPos=new THREE.Vector3(
    center.x+camDir.x*dist,
    center.y+size.y*.3,
    center.z+camDir.z*dist
  );
  var targetLookAt=center.clone();
  var startCamPos=cam.position.clone();
  var startTarget=ctrl.target.clone();
  var t0=performance.now(),dur=1200;
  function tick(now){
    var t=Math.min((now-t0)/dur,1);
    // easeInOutQuart
    var e=t<.5?8*t*t*t*t:1-Math.pow(-2*t+2,4)/2;
    cam.position.lerpVectors(startCamPos,targetPos,e);
    ctrl.target.lerpVectors(startTarget,targetLookAt,e);
    cam.lookAt(ctrl.target);
    if(t<1){flyAnim=requestAnimationFrame(tick)}
    else{flying=false;flyAnim=null;ctrl.enabled=true;document.body.classList.remove('flying');ctrl.update()}
  }
  flyAnim=requestAnimationFrame(tick)
}

function onRayClick(e){
  if(tourOn)return;
  mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,cam);
  // 对每个纪念碑group做intersect，覆盖label sprite等更大体积
  var groups=[];monuments.forEach(function(m){groups.push(m.group)});
  var hits=ray.intersectObjects(groups,true);
  if(hits.length>0){
    // 从命中的object向上追溯到monument group
    var obj=hits[0].object;
    while(obj&&obj.parent){
      for(var i=0;i<monuments.length;i++){
        if(obj===monuments[i].group){
          visited.add(monuments[i].id);currentViewedMonument=monuments[i];flyToMonument(monuments[i]);openDetail(monuments[i]);
          if(monuments[i].data.id===6)doGong(monuments[i]);
          return
        }
      }
      obj=obj.parent;
    }
  }
}

// ═══════════════════════════════════════════════
var tourSteps=[],tourStepIdx=0,tourStepT=0;

function buildTourSteps(){
  tourSteps=[];
  var overviewY=isMobile?20:28,overviewZ=isMobile?42:65;
  // 先飞到全局俯瞰位
  tourSteps.push({
    from:{pos:{x:0,y:overviewY,z:overviewZ},target:{x:0,y:0,z:0}},
    to:{pos:{x:0,y:overviewY,z:overviewZ},target:{x:0,y:0,z:0}},
    dur:1.5,hint:'THE FIRST LINE — A LUNAR ARCHIVE OF WPS',stay:1
  });
  // 逐个纪念碑正面观看（从纪念碑外侧面向正面方向）
  monuments.forEach(function(m){
    var box=new THREE.Box3().setFromObject(m.group);
    var center=box.getCenter(new THREE.Vector3());
    var size=box.getSize(new THREE.Vector3());
    var dist=Math.max(Math.max(size.x,size.z)*(isMobile?0.9:1.2),isMobile?6:8);
    // 纪念碑正面朝向原点，相机从外侧向内看
    var px=m.group.position.x,pz=m.group.position.z;
    var len=Math.sqrt(px*px+pz*pz);
    var outDir;
    if(len<3){
      // 纪念碑在原点附近，从正上方俯瞰避免被近处立柱群遮挡
      if(m.id===4){
        // M4 重写纪念碑：俯瞰视角，从上方偏南看
        outDir=new THREE.Vector3(0,0,-1);
        dist=isMobile?12:18;
        var tgtPos=new THREE.Vector3(
          m.group.position.x+outDir.x*dist,
          20,
          m.group.position.z+outDir.z*dist
        );
        var lookY=m.group.position.y+size.y*.3;
        tourSteps.push({
          from:null,
          to:{pos:{x:tgtPos.x,y:tgtPos.y,z:tgtPos.z},target:{x:m.group.position.x,y:lookY,z:m.group.position.z}},
          dur:1.8,hint:m.data.name+' — '+m.data.en+' ('+m.data.range+')',stay:3
        });
        return
      }
      var pathT=m.cfg.t/(Math.PI*2);
      pathT=((pathT%1)+1)%1;
      var tangent=pathCurve.getTangent(pathT);
      var normal=new THREE.Vector3(-tangent.z,0,tangent.x).normalize();
      outDir=normal
    }else{
      outDir=new THREE.Vector3(px/len,0,pz/len)
    }
    // lookAt用纪念碑group position作为基准，高度略高于地面
    var lookY=m.group.position.y+size.y*.4;
    var tgtPos=new THREE.Vector3(
      m.group.position.x+outDir.x*dist,
      lookY+2,
      m.group.position.z+outDir.z*dist
    );
    tourSteps.push({
      from:null,
      to:{pos:{x:tgtPos.x,y:tgtPos.y,z:tgtPos.z},target:{x:m.group.position.x,y:lookY,z:m.group.position.z}},
      dur:1.8,hint:m.data.name+' — '+m.data.en+' ('+m.data.range+')',stay:3
    });
  });
  // 最后回到全局视角
  tourSteps.push({
    from:null,
    to:{pos:{x:0,y:overviewY,z:overviewZ},target:{x:0,y:0,z:0}},
    dur:2,hint:'导览结束',stay:0
  });
}

function toggleTour(){
  if(tourOn){endTour();return}
  tourOn=true;ctrl.enabled=false;
  // 回到1988，一切从零开始
  setYear(1988);
  buildTourSteps();tourStepIdx=0;tourStepT=0;
  // 设置第一步的from为当前位置
  tourSteps[0].from={pos:{x:cam.position.x,y:cam.position.y,z:cam.position.z},
    target:{x:ctrl.target.x,y:ctrl.target.y,z:ctrl.target.z}};
  toast('策展人导览开始');
  hint(tourSteps[0].hint)
}

function endTour(){
  tourOn=false;ctrl.enabled=true;hideTourCard();
  // 恢复完整展览
  setYear(2026);
  // 确保回到全局视角
  cam.position.set(0,overviewY,overviewZ);ctrl.target.set(0,0,0);ctrl.update();
  toast('导览结束 — 自由漫游已启用')
}

function updateTour(dt){
  if(!tourOn||tourSteps.length===0)return;
  var step=tourSteps[tourStepIdx];
  if(!step)return;
  if(tourStepT===0){
    // 新步骤开始飞行，先隐藏card
    hideTourCard();
    // 动态起点 = 当前相机位置
    step.from={pos:{x:cam.position.x,y:cam.position.y,z:cam.position.z},
      target:{x:ctrl.target.x,y:ctrl.target.y,z:ctrl.target.z}}
  }
  var totalDur=step.dur+step.stay;
  tourStepT+=dt;
  if(tourStepT>=totalDur){
    // 完成当前步骤，跳到下一步
    cam.position.set(step.to.pos.x,step.to.pos.y,step.to.pos.z);
    ctrl.target.set(step.to.target.x,step.to.target.y,step.to.target.z);
    cam.lookAt(ctrl.target);
    tourStepIdx++;
    if(tourStepIdx>=tourSteps.length){endTour();return}
    tourSteps[tourStepIdx].from={pos:{x:step.to.pos.x,y:step.to.pos.y,z:step.to.pos.z},
      target:{x:step.to.target.x,y:step.to.target.y,z:step.to.target.z}};
    tourStepT=0;
    hint(tourSteps[tourStepIdx].hint);
    // 标记已访问
    if(tourStepIdx>0&&tourStepIdx<=monuments.length){
      visited.add(monuments[tourStepIdx-1].id)
    }
    // 推进年份到当前碑的结束年，让碑完全展开
    var nextMonIdx=tourStepIdx-1;
    if(nextMonIdx>=0&&nextMonIdx<monuments.length){
      setYear(monuments[nextMonIdx].cfg.ye)
    }
    return
  }
  if(tourStepT>step.dur&&tourStepT-step.dur<.05){
    // 刚进入停留阶段，显示tour card
    var monIdx=tourStepIdx-1;
    if(monIdx>=0&&monIdx<monuments.length){
      showTourCard(monuments[monIdx].data)
    }
  }
  if(tourStepT<=step.dur){
    // 飞行阶段
    var t=Math.min(tourStepT/step.dur,1);
    var e=t<.5?8*t*t*t*t:1-Math.pow(-2*t+2,4)/2;
    var fp=step.from.pos,tp=step.to.pos,ft=step.from.target,tt=step.to.target;
    cam.position.set(fp.x+(tp.x-fp.x)*e,fp.y+(tp.y-fp.y)*e,fp.z+(tp.z-fp.z)*e);
    ctrl.target.set(ft.x+(tt.x-ft.x)*e,ft.y+(tt.y-ft.y)*e,ft.z+(tt.z-ft.z)*e);
    cam.lookAt(ctrl.target)
  }
}

//  TIMELINE
// ═══════════════════════════════════════════════
function initTimeline(){
  var ticks=document.getElementById('tl-years');
  var keyYears=[1988,1989,1993,2002,2011,2023];
  keyYears.forEach(function(y){
    ticks.innerHTML+='<span'+(y>=2027?' style="color:#222"':'')+'>'+y+'</span>'
  })
}

function yearFromPointer(e){
  var r=document.getElementById('tl-track').getBoundingClientRect();
  var x=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  setYear(Math.round(1988+x*41))
}

function setYear(y){
  y=Math.max(1988,Math.min(2029,y));curYear=y;
  var disp=document.getElementById('yearDisp');
  if(y>=2027){disp.textContent='...';disp.style.color='#444'}
  else{disp.textContent=y;disp.style.color='#c8a84e'}
  var pct=((y-1988)/41)*100;
  document.getElementById('tl-fill').style.width=pct+'%';
  document.getElementById('tl-dot').style.left=pct+'%';
  // Highlight nearest past key year
  var spans=document.getElementById('tl-years').children;
  var ky=[1988,1989,1993,2002,2011,2023];
  var active=ky[0];for(var i=0;i<ky.length;i++){if(y>=ky[i])active=ky[i]}
  for(var i=0;i<spans.length;i++){
    spans[i].classList.toggle('active',parseInt(spans[i].textContent)===active)
  }
  updateGrowth();updateCommitLog()
}

function updateGrowth(){
  monuments.forEach(function(m){
    var ys=m.cfg.ys,ye=m.cfg.ye,g=0;
    if(curYear<ys)g=0;else if(curYear>=ye)g=1;else g=(curYear-ys)/(ye-ys);
    m.growth=g;
    if(g>=.99){m.group.scale.set(1,1,1);m.group.visible=true}
    else if(g<=.01){m.group.scale.set(.01,.01,.01);m.group.visible=true}
    else{var e=g*g;m.group.scale.set(.3+e*.7,e,.3+e*.7);m.group.visible=true}
  })
}

function updateCommitLog(){
  var el=document.getElementById('clList'),h='';
  for(var i=COMMITS.length-1;i>=0;i--){
    var c=COMMITS[i];if(c.y<=curYear){
      h+='<div class="cl-e"><span class="h">'+c.h+'</span> '+c.m+'</div>'
    }
  }
  el.innerHTML=h
}

function animate(){
  requestAnimationFrame(animate);
  var dt=clk.getDelta(),t=clk.getElapsedTime();

  if(flying){/* fly animation handles its own ctrl.update */}
  else if(!tourOn)ctrl.update();else updateTour(dt);

  // Monument 1: falling code
  var m1=monuments[0];
  if(m1&&m1.fx.fall){
    var fd=m1.fx.fall;
    for(var i=0;i<fd.n;i++){
      fd.pos[i*3+1]-=fd.vel[i];
      if(fd.pos[i*3+1]<-.5){fd.pos[i*3+1]=5;fd.pos[i*3]=(Math.random()-.5)*6}
    }
    fd.pts.geometry.attributes.position.needsUpdate=true
  }

  // Monument 2: pillar glow pulse
  var m2=monuments[1];
  if(m2&&m2.fx.pillars){
    m2.fx.pillars.forEach(function(p){if(p.lit&&p.l)p.l.intensity=.8+Math.sin(t*2)*.3})
  }

  // Monument 3: fragment drift + crack pulse
  var m3=monuments[2];
  if(m3&&m3.fx.frags){
    m3.fx.frags.forEach(function(f){
      var d=cam.position.distanceTo(m3.group.position);
      if(d<18)f.position.x=f.userData.base.x+Math.sin(t*.3+f.userData.frag)*.06
    });
    if(m3.fx.crack)m3.fx.crack.material.opacity=.3+Math.sin(t*.7)*.15
  }

  // Monument 4: DIFF oscillation + spire rotation
  var m4=monuments[3];
  if(m4&&m4.fx.old){
    var diff=.5+Math.sin(t*.12)*.3;
    m4.fx.old.forEach(function(b){var bp=b.userData.base;b.position.x=bp.x*(.7+diff*.5)});
    m4.fx.newB.forEach(function(b){var bp=b.userData.base;b.position.x=bp.x*(.4+diff*.6)})
  }
  if(m4&&m4.fx.spire)m4.fx.spire.rotation.y=t*.08;

  // Monument 5: particle rotation
  var m5=monuments[4];
  if(m5&&m5.fx.parts){
    var pd=m5.fx.parts;
    for(var i=0;i<pd.n;i++){
      var a=t*.04+i*.003;
      pd.pos[i*3]=pd.base[i*3]*Math.cos(a)-pd.base[i*3+2]*Math.sin(a);
      pd.pos[i*3+2]=pd.base[i*3]*Math.sin(a)+pd.base[i*3+2]*Math.cos(a)
    }
    pd.pts.geometry.attributes.position.needsUpdate=true
  }

  // Monument 6: fluid wave + task orbit
  var m6=monuments[5];
  if(m6&&m6.fx.fluid){
    var fd=m6.fx.fluid;
    for(var i=0;i<fd.n;i++){
      fd.pos[i*3]=fd.base[i*3]+Math.sin(t*.25+i*.08)*.25;
      fd.pos[i*3+2]=fd.base[i*3+2]+Math.cos(t*.25+i*.08)*.25
    }
    fd.pts.geometry.attributes.position.needsUpdate=true
  }
  if(m6&&m6.fx.tasks){
    m6.fx.tasks.forEach(function(o,idx){
      var a=t*.25+(idx/4)*Math.PI*2;
      o.position.x=Math.cos(a)*2.5;o.position.z=Math.sin(a)*2.5;
      o.rotation.y=t*.4;o.rotation.x=Math.sin(t*.6+idx)*.25
    })
  }

  // Gong gentle sway
  if(monuments[4]&&monuments[4].fx.gong){
    monuments[4].fx.gong.rotation.z=Math.sin(t*.25)*.015
  }

  // Subtle camera breathing when idle (not in tour, not dragging)
  if(!tourOn&&!ctrl.enabled){
    // handled by OrbitControls damping
  }

  // Engineer layer scroll
  engTimer+=dt;
  if(engTimer>1.2){
    engTimer=0;engIdx=(engIdx+1)%ENGINEERS.length
  }

  renderer.render(scene,cam)
}

// ═══════════════════════════════════════════════
//  TOAST & HINT
// ═══════════════════════════════════════════════
function toast(msg){
  var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTmr);toastTmr=setTimeout(function(){el.classList.remove('show')},2500)
}
function hint(msg){
  var el=document.getElementById('hint');el.textContent=msg;el.classList.add('show');
  clearTimeout(hintTmr);hintTmr=setTimeout(function(){el.classList.remove('show')},3000)
}
var tourCardTmr=null;
function showTourCard(data){
  var nameEl=document.getElementById('tcName'),storyEl=document.getElementById('tcStory'),sepEl=document.getElementById('tcSep'),card=document.getElementById('tourCard');
  nameEl.textContent=data.name+'  '+data.en+'  '+data.range;
  // 取desc的第一句话作为故事摘要
  var first=data.desc.indexOf('。');
  storyEl.textContent=data.desc.substring(0,first>0?first+1:data.desc.length);
  sepEl.style.display='block';
  card.classList.add('show');
  clearTimeout(tourCardTmr)
}
function hideTourCard(){
  document.getElementById('tourCard').classList.remove('show')
}

//  WINDOW RESIZE

window.addEventListener('resize',function(){
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight)
});

// ═══════════════════════════════════════════════
//  LOADING SEQUENCE
// ═══════════════════════════════════════════════
function loadSequence(){
  var steps=[
    [15,'INITIALIZING TRANQUILLITY BASE T-01'],
    [30,'LOADING LUNAR SURFACE DATA'],
    [50,'CONSTRUCTING MONUMENT 1: ROOM 501'],
    [62,'CONSTRUCTING MONUMENT 2: 90%'],
    [74,'CONSTRUCTING MONUMENT 3: FRACTURE'],
    [84,'CONSTRUCTING MONUMENT 4: REWRITE'],
    [92,'CONSTRUCTING MONUMENT 5: BILLION SCREENS'],
    [97,'CONSTRUCTING MONUMENT 6: NEXT LINE'],
    [100,'READY — TRANQUILLITY BASE T-01 ONLINE']
  ];
  var i=0;
  function next(){
    if(i>=steps.length){setTimeout(finishLoad,600);return}
    document.getElementById('ldPct').textContent=steps[i][0]+'%';
    document.getElementById('ldSub').textContent=steps[i][1];i++;
    setTimeout(next,180+Math.random()*180)
  }
  next()
}

function finishLoad(){
  document.getElementById('loader').classList.add('done');
  setTimeout(function(){
    document.getElementById('loader').style.display='none';
    document.getElementById('timeline').classList.add('show');
    document.getElementById('commitlog').classList.add('show');
    document.getElementById('ctrls').classList.add('show');
    toast('1988，一个人写下第一行。2029，我们把它刻进月球。')
  },2000)
}

// ═══════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════
function boot(){
  if(typeof THREE==='undefined'){
    document.getElementById('ldSub').textContent='three.min.js 加载失败';
    document.getElementById('ldPct').textContent='ERROR';return
  }
  try{
    // Test WebGL context first
    var tc=document.createElement('canvas');
    var gl=tc.getContext('webgl')||tc.getContext('experimental-webgl');
    if(!gl){document.getElementById('ldSub').textContent='WebGL 不可用';
      document.getElementById('ldPct').textContent='ERROR';return}
    initScene();buildMonuments();initTimeline();setYear(2026);
    initInput();
    updateCommitLog();
    animate();loadSequence()
  }catch(e){
    document.getElementById('ldSub').textContent='初始化失败: '+e.message;
    document.getElementById('ldPct').textContent='ERROR';
    console.error(e)
  }
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);
else boot();
</script>
